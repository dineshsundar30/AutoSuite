version: '3.8'

services:
  autofix-app:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: autofix_app
    volumes:
      - ..:/app
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the user's host projects directory so host paths mirror exactly inside the container
      - /home/dinesh/DK:/home/dinesh/DK
    environment:
      - OLLAMA_HOST=http://ollama-service:11434
      - CHROMA_DB_DIR=/app/chroma_data
    depends_on:
      - ollama-service
    tty: true
    # We keep the container running for interactive CLI usage
    entrypoint: ["tail", "-f", "/dev/null"]

  ollama-service:
    image: ollama/ollama:latest
    container_name: autofix_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # Note: To download a model automatically, you'll need to run:
    # docker exec autofix_ollama ollama run deepseek-coder (or other model)

volumes:
  ollama_data:
